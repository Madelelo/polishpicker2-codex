<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PolishPicker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <p class="eyebrow">Your Collection, Your Canvas</p>
      <h1>PolishPicker</h1>
      <p class="subhead">Track every nail polish you own and discover new nail art combinations in one playful interface.</p>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>Add Polish</h2>
        <form id="polish-form">
          <label>
            Name
            <input id="name" required placeholder="Cherry Gloss" />
          </label>
          <label>
            Brand
            <input id="brand" required placeholder="OPI" />
          </label>
          <label>
            Finish
            <select id="finish" required>
              <option value="">Choose finish</option>
              <option>Cream</option>
              <option>Glitter</option>
              <option>Jelly</option>
              <option>Matte</option>
              <option>Metallic</option>
            </select>
          </label>
          <label>
            Hex Color
            <input id="hex" type="text" value="#ff4d6d" pattern="^#([A-Fa-f0-9]{6})$" />
          </label>
          <button type="submit">Save Polish</button>
        </form>
      </section>

      <section class="panel">
        <h2>Your Collection</h2>
        <ul id="collection" class="collection"></ul>
      </section>

      <section class="panel">
        <h2>Nail Art Picker</h2>
        <div class="filters">
          <label>
            Style
            <select id="style-filter">
              <option value="all">All</option>
              <option value="minimal">Minimal</option>
              <option value="bold">Bold</option>
              <option value="seasonal">Seasonal</option>
            </select>
          </label>
          <label>
            Difficulty
            <select id="difficulty-filter">
              <option value="all">All</option>
              <option value="easy">Easy</option>
              <option value="medium">Medium</option>
              <option value="hard">Hard</option>
            </select>
          </label>
        </div>
        <ul id="art-list" class="art-list"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
